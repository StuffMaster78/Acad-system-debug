<section class="pricing-table">
    <h2>{{ self.heading }}</h2>
    <table>
        <thead><tr><th>Service</th><th>Price</th><th>Turnaround</th></tr></thead>
        <tbody>
            {% for row in self.rows %}
            <tr><td>{{ row.service }}</td><td>{{ row.price }}</td><td>{{ row.turnaround }}</td></tr>
            {% endfor %}
        </tbody>
    </table>
</section>
