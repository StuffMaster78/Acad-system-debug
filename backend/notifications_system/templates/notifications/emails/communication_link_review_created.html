{% extends "notifications/emails/base.html" %}
{% block content %}
<h1>Link review needed</h1>
<p>Hi {{ user.get_full_name|default:user.username }},</p>
<p>A link shared in conversation #{{ thread_id }} requires review.</p>
<table class="detail-table">
  <tr><td>Domain</td><td>{{ domain }}</td></tr>
  <tr><td>URL</td><td>{{ url }}</td></tr>
</table>
{% if cta_url %}
<div class="btn-wrapper">
  <a href="{{ cta_url }}" class="btn">Review link</a>
</div>
{% endif %}
{% endblock %}
