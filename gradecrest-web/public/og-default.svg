<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f1f3d"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Logo mark -->
  <rect x="80" y="80" width="72" height="72" rx="14" fill="#4f46e5"/>
  <text x="116" y="136" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="white" text-anchor="middle">G</text>
  <!-- Site name -->
  <text x="172" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white">GradeCrest</text>
  <!-- Headline -->
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white">Expert academic writing</text>
  <text x="80" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#a5b4fc">by verified humans.</text>
  <!-- Sub -->
  <text x="80" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.6)">From $13/page · Grade or money back · Zero AI content</text>
</svg>
