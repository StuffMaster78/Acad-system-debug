<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- GradeCrest: teal bg, white mortarboard, orange tassel, white G -->
  <rect width="32" height="32" rx="7" fill="#16803d"/>
  <!-- Mortarboard flat board -->
  <rect x="5" y="5" width="22" height="3.5" rx="1.75" fill="white"/>
  <!-- Centre post -->
  <rect x="14.25" y="3" width="3.5" height="4" rx="1" fill="white"/>
  <!-- Orange tassel dot -->
  <circle cx="27" cy="6.5" r="2.5" fill="#ea580c"/>
  <!-- G letterform -->
  <text x="16" y="27" font-family="Georgia,'Times New Roman',serif" font-size="19" font-weight="700" fill="white" text-anchor="middle">G</text>
</svg>
