name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  pr-hygiene:
    name: PR Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
          requireScope: false
        continue-on-error: true

      - name: Check for merge conflicts
        run: |
          git fetch origin ${{ github.base_ref }}
          if git merge-tree $(git merge-base HEAD origin/${{ github.base_ref }}) HEAD origin/${{ github.base_ref }} | grep -q '<<<<<<<'; then
            echo "Merge conflicts detected."
            exit 1
          fi

      - name: Check large files
        run: |
          max_size=5242880
          find . -type f -size +${max_size}c \
            ! -path './.git/*' \
            ! -path './backend/.venv/*' \
            ! -path './backend/venv/*' \
            ! -path './backend/staticfiles/*'

      - name: Report TODO/FIXME comments
        run: |
          echo "## TODO/FIXME Comments" >> "$GITHUB_STEP_SUMMARY"
          rg -n "TODO|FIXME" backend docs .github --glob '*.py' --glob '*.md' --glob '*.yml' >> "$GITHUB_STEP_SUMMARY" || true

      - name: Check for obvious hardcoded secrets
        run: |
          echo "## Potential Secrets" >> "$GITHUB_STEP_SUMMARY"
          rg -n -i "(password|secret|api_key|token)\\s*=\\s*['\\\"][^'\\\"]+['\\\"]" backend .github \
            --glob '*.py' --glob '*.yml' \
            --glob '!backend/.venv/**' \
            --glob '!backend/**/tests/**' >> "$GITHUB_STEP_SUMMARY" || true
