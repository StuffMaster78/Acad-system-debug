name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Git tag or SHA to deploy (e.g. v1.2.3)'
        required: true
        type: string

# Required GitHub Secrets:
#   PROD_SSH_HOST          — server hostname or IP
#   PROD_SSH_USER          — SSH user (e.g. deploy)
#   PROD_SSH_KEY           — private SSH key (PEM)
#   PROD_DEPLOY_PATH       — absolute path on server (e.g. /opt/writing-system)
#   PROD_ENV_FILE          — full contents of the production .env file

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel a running production deploy

jobs:
  # ----------------------------------------------------------------
  # 1. CI gate — run tests before deploying
  # ----------------------------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_pass
          POSTGRES_DB: ci_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install backend deps
        working-directory: ./backend
        run: pip install -r requirements.txt pytest pytest-django

      - name: Django system check
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: writing_system.settings_test
          SECRET_KEY: ci-gate-secret
          POSTGRES_DB_NAME: ci_db
          POSTGRES_USER_NAME: ci_user
          POSTGRES_PASSWORD: ci_pass
          DB_HOST: localhost
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py check --settings=writing_system.settings_test

      - name: Run backend tests
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: writing_system.settings_test
          SECRET_KEY: ci-gate-secret
          POSTGRES_DB_NAME: ci_db
          POSTGRES_USER_NAME: ci_user
          POSTGRES_PASSWORD: ci_pass
          DB_HOST: localhost
          REDIS_URL: redis://localhost:6379/0
        run: pytest -x -q

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install frontend deps
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend type check + build
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: /api/v1
        run: |
          pnpm typecheck
          pnpm build

  # ----------------------------------------------------------------
  # 2. Deploy to production server via SSH
  # ----------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: ci-gate
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.PROD_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Write .env file to runner
        run: echo "${{ secrets.PROD_ENV_FILE }}" > .env.production

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.PROD_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy .env to server
        run: |
          scp .env.production \
            ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/.env

      - name: Deploy
        env:
          HOST: ${{ secrets.PROD_SSH_HOST }}
          USER: ${{ secrets.PROD_SSH_USER }}
          PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          REF: ${{ github.ref_name }}
        run: |
          ssh $USER@$HOST bash -s << 'ENDSSH'
            set -euo pipefail

            cd ${{ secrets.PROD_DEPLOY_PATH }}

            echo "==> Pulling latest code ($REF)"
            git fetch --tags origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }} || true

            echo "==> Building images"
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              build --no-cache web celery beat

            echo "==> Starting / updating services"
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --remove-orphans

            echo "==> Waiting for web to become healthy"
            for i in $(seq 1 12); do
              STATUS=$(docker compose -f docker-compose.yml -f docker-compose.prod.yml \
                ps --format json web 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
              if [ "$STATUS" = "healthy" ]; then
                echo "Web service is healthy."
                break
              fi
              echo "Waiting... ($i/12)"
              sleep 10
            done

            echo "==> Pruning old images"
            docker image prune -f

            echo "==> Deploy complete"
          ENDSSH

      - name: Post-deploy health check
        run: |
          sleep 5
          curl --fail --silent --max-time 10 \
            https://${{ vars.PROD_DOMAIN }}/health/live/ \
            || (echo "Health check failed" && exit 1)

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deploy failed for ${{ github.ref_name }}"
          # Add Slack/email notification here if needed
