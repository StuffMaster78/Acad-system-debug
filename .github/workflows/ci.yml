name: Backend CI

on:
  push:
    branches: [main, develop, 'feature/**', 'codex/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci_test_user
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: ci_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov flake8 black isort

      - name: Run Django system check
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: writing_system.settings_test
          SECRET_KEY: ci-test-secret-key
          POSTGRES_DB_NAME: ci_test_db
          POSTGRES_USER_NAME: ci_test_user
          POSTGRES_PASSWORD: ci_test_password
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: python manage.py check --settings=writing_system.settings_test

      - name: Check formatting
        working-directory: ./backend
        run: |
          black --check .
          isort --check-only .

      - name: Run import/error lint
        working-directory: ./backend
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: writing_system.settings_test
          SECRET_KEY: ci-test-secret-key
          POSTGRES_DB_NAME: ci_test_db
          POSTGRES_USER_NAME: ci_test_user
          POSTGRES_PASSWORD: ci_test_password
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: pytest -v --tb=short --junitxml=junit.xml

      - name: Generate OpenAPI schema
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: writing_system.settings_test
          SECRET_KEY: ci-test-secret-key
          POSTGRES_DB_NAME: ci_test_db
          POSTGRES_USER_NAME: ci_test_user
          POSTGRES_PASSWORD: ci_test_password
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: python manage.py spectacular --file schema.yml --settings=writing_system.settings_test

      - name: Upload test and schema artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-ci-artifacts
          path: |
            backend/junit.xml
            backend/schema.yml
          retention-days: 7
