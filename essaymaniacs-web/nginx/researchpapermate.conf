# Serve the Nuxt SSG output (.output/public/) with nginx on DigitalOcean
# Copy .output/public/ to /var/www/researchpapermate and point root here.

server {
    listen 80;
    server_name researchpapermate.com www.researchpapermate.com;
    return 301 https://researchpapermate.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.researchpapermate.com;
    ssl_certificate     /etc/letsencrypt/live/researchpapermate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/researchpapermate.com/privkey.pem;
    return 301 https://researchpapermate.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name researchpapermate.com;

    ssl_certificate     /etc/letsencrypt/live/researchpapermate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/researchpapermate.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/researchpapermate;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-lived cache for hashed assets
    location ~* \.(js|css|woff2?|png|jpg|webp|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML — no cache (so rebuilds take effect immediately)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # SPA fallback — send all unmatched paths to index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
