# =============================================================================
# Writing System Platform - docker-compose.yml (DEVELOPMENT)
# Usage: docker-compose up -d
# =============================================================================

services:
  # PostgreSQL 15 — pinned minor version, matches production
  db:
    image: postgres:15.13-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME:-writing_system_db}
      POSTGRES_USER: ${POSTGRES_USER_NAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # exposed for local DB tools in dev only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7 — pinned minor version, matches production
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379" # exposed for local inspection in dev only
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django / Wagtail backend
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
      args:
        DJANGO_ENV: development
    restart: unless-stopped
    environment:
      DJANGO_ENV: development
      DJANGO_SETTINGS_MODULE: writing_system.settings
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-key}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME:-writing_system_db}
      POSTGRES_USER_NAME: ${POSTGRES_USER_NAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      DB_HOST: db
      POSTGRES_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      COMMUNICATIONS_REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/2
      CHANNEL_REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/3
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:5174,http://localhost:3000"
      CSRF_TRUSTED_ORIGINS: "http://localhost:8000,http://127.0.0.1:8000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:3000"
      USE_S3: "False"
      WAGTAILADMIN_BASE_URL: "http://localhost:8000"
    volumes:
      - ./backend:/app # live code reload in dev
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

  # Celery worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
      args:
        DJANGO_ENV: development
    restart: unless-stopped
    environment:
      DJANGO_ENV: development
      DJANGO_SETTINGS_MODULE: writing_system.settings
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-key}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME:-writing_system_db}
      POSTGRES_USER_NAME: ${POSTGRES_USER_NAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      DB_HOST: db
      POSTGRES_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      COMMUNICATIONS_REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/2
      CHANNEL_REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/3
      USE_S3: "False"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "writing_system", "worker", "--loglevel=info", "--concurrency=2"]

  # Celery Beat scheduler
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
      args:
        DJANGO_ENV: development
    restart: unless-stopped
    environment:
      DJANGO_ENV: development
      DJANGO_SETTINGS_MODULE: writing_system.settings
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-key}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME:-writing_system_db}
      POSTGRES_USER_NAME: ${POSTGRES_USER_NAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      DB_HOST: db
      POSTGRES_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      USE_S3: "False"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "writing_system", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
