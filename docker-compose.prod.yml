# =============================================================================
# Writing System Platform - docker-compose.prod.yml (PRODUCTION)
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Image versions are pinned — test before bumping any minor version.
# =============================================================================

services:
  db:
    image: postgres:15.13-alpine   # pinned minor version
    env_file: !reset []
    ports: !reset [] # never expose DB port in production
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine        # pinned minor version
    env_file: !reset []
    ports: !reset [] # never expose Redis port in production
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes --loglevel warning"]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DJANGO_SETTINGS_MODULE: writing_system.settings
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    image: ${BACKEND_IMAGE:-writing-platform-backend:local}
    env_file: !reset []
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - internal   # reaches db + redis
      - proxy      # reachable by nginx
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
      args:
        DJANGO_ENV: production
    environment:
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: writing_system.settings
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME}
      POSTGRES_USER_NAME: ${POSTGRES_USER_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      POSTGRES_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      COMMUNICATIONS_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      CHANNEL_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      SENTRY_DSN: ${SENTRY_DSN}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-do_spaces}
      USE_S3: "True"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-nyc3}
      DO_SPACES_CDN_ENDPOINT: ${DO_SPACES_CDN_ENDPOINT}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET}
      DEFAULT_EMAIL_PROVIDER: ${DEFAULT_EMAIL_PROVIDER}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      WAGTAILADMIN_BASE_URL: ${WAGTAILADMIN_BASE_URL}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-.writerscreek.com}
      CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN:-.writerscreek.com}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-False}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "true"
      LOG_DIR: /var/log/writing-system
      CELERY_RESULT_EXPIRES: "3600"  # expire task results after 1 hour
    volumes: !override
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - log_volume:/var/log/writing-system
    ports: !reset [] # Nginx handles external traffic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery:
    image: ${BACKEND_IMAGE:-writing-platform-backend:local}
    env_file: !reset []
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
      - egress
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
      args:
        DJANGO_ENV: production
    environment:
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: writing_system.settings
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME}
      POSTGRES_USER_NAME: ${POSTGRES_USER_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      POSTGRES_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      COMMUNICATIONS_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      CHANNEL_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      SENTRY_DSN: ${SENTRY_DSN}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-do_spaces}
      USE_S3: "True"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-nyc3}
      DO_SPACES_CDN_ENDPOINT: ${DO_SPACES_CDN_ENDPOINT}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET}
      DEFAULT_EMAIL_PROVIDER: ${DEFAULT_EMAIL_PROVIDER}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      WAGTAILADMIN_BASE_URL: ${WAGTAILADMIN_BASE_URL}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-.writerscreek.com}
      CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN:-.writerscreek.com}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-False}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      LOG_DIR: /var/log/writing-system
    volumes: !override
      - log_volume:/var/log/writing-system
    command: ["celery", "-A", "writing_system", "worker", "--loglevel=info", "--concurrency=4"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    image: ${BACKEND_IMAGE:-writing-platform-backend:local}
    env_file: !reset []
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
      - egress
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
      args:
        DJANGO_ENV: production
    environment:
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: writing_system.settings
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME}
      POSTGRES_USER_NAME: ${POSTGRES_USER_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      POSTGRES_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-do_spaces}
      USE_S3: "True"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-nyc3}
      DO_SPACES_CDN_ENDPOINT: ${DO_SPACES_CDN_ENDPOINT}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET}
      DEFAULT_EMAIL_PROVIDER: ${DEFAULT_EMAIL_PROVIDER}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      WAGTAILADMIN_BASE_URL: ${WAGTAILADMIN_BASE_URL}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-.writerscreek.com}
      CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN:-.writerscreek.com}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-False}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      LOG_DIR: /var/log/writing-system
    volumes: !override
      - log_volume:/var/log/writing-system
    command: ["celery", "-A", "writing_system", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27.5-alpine    # pinned minor version
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy      # reaches only public-facing app containers, never db/redis
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/app.conf:ro
      - ./nginx/empty.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/includes:/etc/nginx/includes:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
      portal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Shared Vue portal (host-aware client, writer, and staff surfaces) ───────
  portal:
    image: ${PORTAL_IMAGE:-writing-platform-portal:local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── WritersCreek statically generated marketing site ───────────────────────
  writerscreek-web:
    image: ${WRITERSCREEK_IMAGE:-writing-platform-writerscreek:local}
    env_file: !reset []
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy     # nginx → writerscreek-web:3000
      - internal  # retained for parity with the server-rendered GradeCrest site
    build:
      context: .
      dockerfile: writerscreek-web/Dockerfile
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_WC_API_BASE:-https://writerscreek.com}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_WC_APP_URL:-https://app.writerscreek.com}
      NUXT_PUBLIC_STAFF_URL: ${NUXT_PUBLIC_WC_STAFF_URL:-https://admin.writerscreek.com}
      NUXT_API_BASE_INTERNAL: "http://web:8000"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── GradeCrest marketing site (Nuxt SSR) ──────────────────────────────────
  gradecrest-web:
    image: ${GRADECREST_IMAGE:-writing-platform-gradecrest:local}
    env_file: !reset []
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy     # nginx → gradecrest-web:3000
      - internal  # gradecrest-web → web:8000 (SSR API calls)
    build:
      context: .
      dockerfile: gradecrest-web/Dockerfile
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_GC_API_BASE:-https://gradecrest.com}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_GC_APP_URL:-https://app.gradecrest.com}
      NUXT_API_BASE_INTERNAL: "http://web:8000"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── NurseMyGrade statically generated marketing site ───────────────────────
  nursemygrade-web:
    image: ${NURSEMYGRADE_IMAGE:-writing-platform-nursemygrade:local}
    env_file: !reset []
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - internal
    build:
      context: .
      dockerfile: nursemygrade-web/Dockerfile
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_NMG_API_BASE:-https://nursemygrade.com}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_NMG_APP_URL:-https://app.nursemygrade.com}
      NUXT_API_BASE_INTERNAL: "http://web:8000"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── EssayManiacs statically generated marketing site ───────────────────────
  essaymaniacs-web:
    image: ${ESSAYMANIACS_IMAGE:-writing-platform-essaymaniacs:local}
    env_file: !reset []
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - internal
    build:
      context: .
      dockerfile: essaymaniacs-web/Dockerfile
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_EM_API_BASE:-https://essaymaniacs.com}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_EM_APP_URL:-https://app.essaymaniacs.com}
      NUXT_API_BASE_INTERNAL: "http://web:8000"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── ResearchPaperMate statically generated marketing site ─────────────────
  researchpapermate-web:
    image: ${RESEARCHPAPERMATE_IMAGE:-writing-platform-researchpapermate:local}
    env_file: !reset []
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - internal
    build:
      context: .
      dockerfile: researchpapermate-web/Dockerfile
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_RPM_API_BASE:-https://researchpapermate.com}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_RPM_APP_URL:-https://app.researchpapermate.com}
      NUXT_API_BASE_INTERNAL: "http://web:8000"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Database backup ────────────────────────────────────────────────────────
  # Runs pg_dump daily at 03:00, compresses, and uploads to S3/DO Spaces.
  # Keeps last 7 local backups and enforces 30-day S3 retention.
  backup:
    image: postgres:15.13-alpine   # pinned, same as db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - internal   # needs to reach db
      - egress     # uploads encrypted dumps to Spaces
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER_NAME: ${POSTGRES_USER_NAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY}
      AWS_ACCESS_KEY_ID: ${BACKUP_AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${BACKUP_AWS_STORAGE_BUCKET_NAME}
      AWS_S3_ENDPOINT_URL: ${BACKUP_AWS_S3_ENDPOINT_URL:-https://nyc3.digitaloceanspaces.com}
      AWS_S3_REGION_NAME: ${BACKUP_AWS_S3_REGION_NAME:-nyc3}
      BACKUP_S3_PREFIX: backups/db
      BACKUP_LOCAL_KEEP: "7"
      BACKUP_S3_KEEP_DAYS: "30"
    volumes:
      - backup_volume:/backups
      - ./backend/scripts/backup-db.sh:/usr/local/bin/backup-db.sh:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
    # Install awscli then run backup at 03:00 daily via crond
    command: >
      sh -c "
        apk add --no-cache aws-cli openssl &&
        echo '0 3 * * * /usr/local/bin/backup-db.sh >> /var/log/db-backup.log 2>&1' | crontab - &&
        crond -f -d 8
      "

  # ── Uptime Kuma — self-hosted monitoring dashboard ─────────────────────────
  # Access at http://your-server:3001 (or proxy through nginx).
  # Configure monitors via the UI at first launch.
  # Recommended monitors to add:
  #   - HTTP: https://yourdomain.com/health/live/    (interval: 60s)
  #   - HTTP: https://yourdomain.com/health/ready/   (interval: 60s)
  #   - HTTP: https://yourdomain.com/health/         (interval: 300s)
  #   - Postgres: host=db port=5432 (internal)
  #   - Redis: redis://:PASSWORD@redis:6379/0 (internal)
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.16  # pinned stable release
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - internal   # monitors internal services; bound to 127.0.0.1
    ports:
      - "127.0.0.1:3001:3001"   # bind to loopback — proxy through nginx for external access
    volumes:
      - kuma_data:/app/data
    depends_on:
      - web
      - db
      - redis

  # Certbot — runs once to issue/renew certs; nginx reloads automatically
  certbot:
    image: certbot/certbot:latest
    profiles: ["tools"]
    networks:
      - proxy      # needs to reach nginx webroot for ACME challenge
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/certbot:/var/www/certbot
    # Override command at runtime:
    #   Initial issuance:
    #     docker compose run --rm certbot certonly --webroot \
    #       -w /var/www/certbot -d yourdomain.com -d www.yourdomain.com \
    #       --email admin@yourdomain.com --agree-tos --non-interactive
    #   Renewal (run via host cron/systemd timer):
    #     docker compose --profile tools run --rm certbot renew

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  log_volume:
  backup_volume:
  kuma_data:

# ── Network segmentation ───────────────────────────────────────────────────────
# internal: db, redis, workers, backup — isolated from the public internet.
#           Only 'web' bridges into this network from the proxy side.
# proxy:    nginx ↔ web/portal/marketing. It cannot reach db or redis directly.
networks:
  internal:
    driver: bridge
    internal: true          # no outbound internet access from this network
  proxy:
    driver: bridge
  egress:
    driver: bridge
