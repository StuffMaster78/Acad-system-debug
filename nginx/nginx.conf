    ssl_certificate_key  /etc/letsencrypt/live/admin.writerscreek.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/admin.writerscreek.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: ws:; frame-ancestors 'none';" always;
    add_header X-Robots-Tag              "noindex, nofollow"                            always;
    server_tokens off;

    client_max_body_size 50M;

    # ── Optional: restrict staff portal to office/VPN IPs ──────────────────
    # Uncomment and add your IPs to block public access entirely:
    # allow YOUR_OFFICE_IP/32;
    # allow YOUR_VPN_CIDR/24;
    # deny all;

    # ── Static & media files ────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "private";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Auth endpoints — strict rate limit ─────────────────────────────────
    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SSE notifications stream ────────────────────────────────────────────
    location /api/v1/notifications/stream/ {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering      off;
        proxy_cache          off;
        proxy_read_timeout   3600s;
        chunked_transfer_encoding on;
    }

    # ── Uptime Kuma monitoring ──────────────────────────────────────────────
    location /status/ {
        allow 127.0.0.1;
        allow ::1;
        # allow YOUR_STAFF_IP/32;
        deny all;

        proxy_pass http://uptime_kuma;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── WebSocket (Django Channels) ────────────────────────────────────────
    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── All other API traffic ───────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── CMS admin ──────────────────────────────────────────────────────────
    location /cms-admin/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Everything else (SPA page serving) ────────────────────────────────
    location / {
        limit_req zone=global burst=60 nodelay;

        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
        proxy_cache     off;
    }
}
