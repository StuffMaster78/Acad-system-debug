# =============================================================================
# Writing System Platform — Production nginx reverse proxy
#
# BEFORE DEPLOYING: replace YOUR_DOMAIN with your actual staff portal domain,
# e.g. staff.writepro.com. Client tenant domains are served by the same
# Django app (resolved via PortalTenantResolverMiddleware) so no per-tenant
# nginx block is needed.
#
# Generate SSL:  certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
# =============================================================================

# ── Rate-limit zones ──────────────────────────────────────────────────────────
# These are declared in the http{} block (included by the parent nginx.conf).
# If your nginx setup wraps this file inside http{}, declare zones here.
limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m    rate=120r/m;

upstream django {
    server web:8000;
    keepalive 32;
}

upstream uptime_kuma {
    server uptime-kuma:3001;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Allow ACME challenge for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── TLS ────────────────────────────────────────────────────────────────
    ssl_certificate      /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key  /etc/nginx/certs/privkey.pem;
    ssl_trusted_certificate /etc/nginx/certs/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options       "nosniff"                                       always;
    add_header X-Frame-Options              "DENY"                                          always;
    add_header X-XSS-Protection            "1; mode=block"                                 always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin"                always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy     "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    # Remove server version from responses
    server_tokens off;

    client_max_body_size 50M;

    # ── Static & media files ────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "private";
        # Prevent direct script execution from media uploads
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Auth endpoints — strict rate limit (5 req/min) ─────────────────────
    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SSE notifications stream (long-lived connection) ───────────────────
    location /api/v1/notifications/stream/ {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering      off;
        proxy_cache          off;
        proxy_read_timeout   3600s;
        chunked_transfer_encoding on;
    }

    # ── Uptime Kuma monitoring — loopback only, require IP allowlist ───────
    location /status/ {
        # Only allow access from trusted staff IPs or localhost.
        # Add your office/VPN IP(s) here before deploying.
        allow 127.0.0.1;
        allow ::1;
        # allow YOUR_STAFF_IP/32;   # uncomment and set your IP
        deny all;

        proxy_pass http://uptime_kuma;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── All other API traffic ───────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── CMS admin — rate limit ──────────────────────────────────────────────
    location /cms-admin/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Everything else (page serving) ─────────────────────────────────────
    location / {
        limit_req zone=global burst=60 nodelay;

        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
        proxy_cache     off;
    }
}
