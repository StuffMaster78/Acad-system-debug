# HTTP-only bootstrap configuration. Use this before certificates exist.
server {
    listen 80 default_server;
    server_name
        writerscreek.com www.writerscreek.com
        app.writerscreek.com admin.writerscreek.com
        gradecrest.com www.gradecrest.com app.gradecrest.com
        nursemygrade.com www.nursemygrade.com app.nursemygrade.com
        essaymaniacs.com www.essaymaniacs.com app.essaymaniacs.com
        researchpapermate.com www.researchpapermate.com app.researchpapermate.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "bootstrap-ok\n";
    }

    location / {
        add_header Content-Type text/plain;
        return 503 "TLS certificate bootstrap in progress.\n";
    }
}
