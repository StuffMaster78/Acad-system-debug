# HTTP-only overlay used before the first Let's Encrypt certificates exist.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     -f docker-compose.bootstrap.yml up -d nginx
services:
  nginx:
    ports: !override
      - "80:80"
    volumes: !override
      - ./nginx/bootstrap.conf:/etc/nginx/conf.d/app.conf:ro
      - ./nginx/empty.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot:/var/www/certbot:ro
